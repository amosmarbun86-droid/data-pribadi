<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel Secure</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

/* LOGIN */
#loginBox{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
margin:5px 0;
width:100%;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.danger{
background:#ef4444;
}

.danger:hover{
background:#dc2626;
}

/* PANEL */
#adminPanel{
display:none;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.device{
background:#334155;
padding:10px;
margin:8px 0;
border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">

<h2>🔐 Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p id="error" style="color:red"></p>

</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h2>⚙️ Device Admin Panel</h2>

<div class="card">
<h3>Device Access Control</h3>

<button onclick="addDevice()">➕ Tambah Device</button>
<button onclick="renderDevices()">📱 Refresh Device</button>

<div id="deviceList"></div>

</div>

<div class="card">
<h3>Security Status</h3>
<p id="status">System Secure ✅</p>
</div>

<button class="danger" onclick="logout()">Logout</button>

</div>

<script>

/* ======================
   ADMIN ACCOUNT
====================== */

const ADMIN_USER="admin";
const ADMIN_PASS="Amosrcp86";

/* ======================
   AUTO LOGIN
====================== */

if(localStorage.getItem("adminLogin")=="true"){
showAdmin();
}

/* ======================
   LOGIN
====================== */

function login(){

let u=user.value;
let p=pass.value;

if(u===ADMIN_USER && p===ADMIN_PASS){
localStorage.setItem("adminLogin","true");
showAdmin();
}else{
error.innerText="Login Salah!";
}

}

/* ======================
   SHOW PANEL
====================== */

function showAdmin(){
loginBox.style.display="none";
adminPanel.style.display="block";
renderDevices();
}

/* ======================
   LOGOUT
====================== */

function logout(){
localStorage.removeItem("adminLogin");
location.reload();
}

/* ======================
   DEVICE SYSTEM
====================== */

function getDevices(){
return JSON.parse(localStorage.getItem("devices")||"[]");
}

function saveDevices(data){
localStorage.setItem("devices",JSON.stringify(data));
}

/* TAMBAH DEVICE */

function addDevice(){

let devices=getDevices();

let id="DEV-"+Date.now();

devices.push({
id:id,
status:"active"
});

saveDevices(devices);

renderDevices();

alert("Device berhasil ditambahkan");
}

/* BAN DEVICE */

function banDevice(id){

let devices=getDevices();

devices=devices.map(d=>{
if(d.id===id){ d.status="banned"; }
return d;
});

saveDevices(devices);
renderDevices();
}

/* HAPUS DEVICE */

function deleteDevice(id){

let devices=getDevices().filter(d=>d.id!==id);

saveDevices(devices);
renderDevices();
}

/* TAMPILKAN DEVICE */

function renderDevices(){

let devices=getDevices();

let html="";

if(devices.length==0){
html="<p>Tidak ada device</p>";
}

devices.forEach(d=>{

html+=`
<div class="device">
<b>${d.id}</b><br>
Status: ${d.status}

<button onclick="banDevice('${d.id}')" class="danger">Ban</button>
<button onclick="deleteDevice('${d.id}')">Hapus</button>
</div>
`;

});

deviceList.innerHTML=html;
}

</script>

</body>
</html>
