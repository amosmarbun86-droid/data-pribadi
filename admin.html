<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel Secure</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

/* LOGIN PAGE */
#loginBox{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* ADMIN DASHBOARD */
#adminPanel{
display:none;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}
.device{
background:#020617;
padding:10px;
margin:8px 0;
border-radius:8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h2>🔐 Admin Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p id="error" style="color:red"></p>
</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h2>⚙️ Device Admin Panel</h2>

<div class="card">
<h3>📊 Statistik Device</h3>
<p id="stats">Loading...</p>
</div>

<div class="card">
<h3>📱 Device List (Realtime)</h3>
<div id="deviceList"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<script src="api.js"></script>

<script>

/* ==============================
   ADMIN LOGIN
================================*/

const ADMIN_USER="admin";
const ADMIN_PASS="Amosrcp86";

if(localStorage.getItem("adminLogin")=="true"){
showAdmin();
loadDevices();
setInterval(loadDevices,5000);
}

function login(){

let u=user.value;
let p=pass.value;

if(u===ADMIN_USER && p===ADMIN_PASS){
localStorage.setItem("adminLogin","true");
showAdmin();
loadDevices();
setInterval(loadDevices,5000);
}else{
error.innerText="Login Salah!";
}
}

function showAdmin(){
loginBox.style.display="none";
adminPanel.style.display="block";
}

function logout(){
localStorage.removeItem("adminLogin");
location.reload();
}

/* ==============================
   DATABASE CONNECT
================================*/

const API_URL =
"https://api.github.com/repos/amosmarbun86-droid/data-pribadi/contents/device.json";

async function getDB(){

const res=await fetch(API_URL);
const data=await res.json();

return{
sha:data.sha,
db:JSON.parse(atob(data.content))
};
}

/* ==============================
   LOAD DEVICE REALTIME
================================*/

async function loadDevices(){

const {db}=await getDB();

let active=db.devices.filter(d=>d.status=="active").length;
let banned=db.devices.filter(d=>d.status=="banned").length;

stats.innerHTML=
`
Active : ${active}<br>
Banned : ${banned}<br>
Total : ${db.devices.length}
`;

let html="";

db.devices.forEach(d=>{

html+=`
<div class="device">
ID : ${d.id}<br>
Status : ${d.status}<br>
<button onclick="banDevice('${d.id}')">
🚫 BAN
</button>
</div>
`;

});

deviceList.innerHTML=html;
}

/* ==============================
   BAN DEVICE (REAL UPDATE)
================================*/

async function banDevice(id){

const token = prompt("Masukkan ADMIN TOKEN:");

if(!token) return;

const current=await getDB();
const db=current.db;

let dev=db.devices.find(x=>x.id===id);
dev.status="banned";

await fetch(API_URL,{
method:"PUT",
headers:{
"Authorization":"Bearer "+token,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"BAN DEVICE",
content:btoa(JSON.stringify(db,null,2)),
sha:current.sha
})
});

alert("Device berhasil di BAN ✅");

loadDevices();
}

</script>

</body>
</html>
