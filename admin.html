<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Secured Edition</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --primary: #2563eb;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f97316;
    --border: #334155;
  }

  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 16px; margin: 0; }
  h1, h2, h3 { margin: 0 0 12px 0; }
  .card { background: var(--card); padding: 20px; margin-bottom: 16px; border-radius: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2); border: 1px solid var(--border); box-sizing: border-box; }
  
  input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; background: #1e293b; color: white; font-size: 15px; box-sizing: border-box; }
  input:focus { outline: 2px solid var(--primary); background: #0f172a; }
  
  button { width: 100%; padding: 12px; font-weight: bold; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; color: white; }
  button:active { transform: scale(0.98); }
  
  .btn-blue { background: var(--primary); }
  .btn-green { background: var(--green); }
  .btn-red { background: var(--red); }
  .btn-orange { background: var(--orange); }
  
  .btn-small { width: auto; padding: 6px 12px; font-size: 13px; margin: 0; }
  .flex-group { display: flex; justify-content: space-between; align-items: center; background: #334155; padding: 10px; margin: 6px 0; border-radius: 8px; }
  
  /* Style Form Login Admin */
  #loginAdminBox { max-width: 400px; margin: 80px auto; text-align: center; }
</style>
</head>
<body>

<div id="loginAdminBox" class="card">
  <h2>🔐 Verifikasi Akses Admin</h2>
  <p style="color: var(--text-muted); font-size: 14px;">Silakan masukkan PIN Khusus Admin untuk mengelola sistem.</p>
  <input type="password" id="adminPinInput" placeholder="Masukkan PIN Admin">
  <button class="btn-blue" onclick="cekLoginAdmin()">Masuk Panel</button>
  <p id="loginError" style="color: var(--red); font-weight: bold; font-size: 14px; margin-top: 8px;"></p>
</div>

<div id="adminContent" style="display: none;">
  <h1>⚙️ Admin Panel HP Rental</h1>

  <div class="card" style="border-top: 4px solid var(--primary);">
    <h2>📱 Device Control</h2>
    <input id="deviceInput" placeholder="Device ID Terpilih (Klik 'Pilih HP Ini' di bawah)" readonly style="background:#0f172a; color: var(--text-muted);">
    <input id="pinInput" placeholder="Masukkan PIN Aktif untuk Perangkat (Contoh: 1234)">

    <button class="btn-green" onclick="approveDevice()">1. Setujui & Beri PIN</button>
    <button class="btn-orange" onclick="banDevice()">2. Blokir Perangkat (BAN)</button>
    <button class="btn-red" onclick="hapusDevice Permanent()">3. Hapus Device dari List</button>
  </div>

  <div class="card" style="border-top: 4px solid var(--green);">
    <h2>📦 Input Link APK VERSION (MediaFire/Drive)</h2>
    <input id="versiInput" type="number" placeholder="Versi APK (Contoh: 4)">
    <input id="namaApkInput" type="text" placeholder="Nama Aplikasi (Contoh: WA_Sender_v4.apk)">
    <input id="linkApkInput" type="text" placeholder="Tempel / Paste Link MediaFire / Drive Disini">
    <button class="btn-green" onclick="simpanLinkAPK()">Kirim Link ke Aplikasi</button>
    <p id="apkStatus" style="color: var(--green); font-weight: bold; margin: 4px 0 0 0;"></p>

    <h3 style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 12px;">📋 Daftar APK Aktif (Bisa Dihapus)</h3>
    <div id="adminApkList"></div>
  </div>

  <div class="card">
    <h2>⏳ Daftar Perangkat Terdeteksi</h2>
    <div id="deviceList"></div>
  </div>

  <div class="card">
    <h2>📒 Daftar Kontak Tersimpan</h2>
    <div id="userList"></div>
  </div>
  
  <button class="btn-red" onclick="logoutAdmin()" style="max-width: 150px; margin-top: 10px;">➔ Keluar Admin</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
authDomain:"data-pribadi-9cfe6.firebaseapp.com",
projectId:"data-pribadi-9cfe6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PIN KEAMANAN UTAMA PANEL ADMIN (Silakan ganti sesuai keinginan Anda, Amos)
const PIN_RAHASIA_ADMIN = "8686"; 

// FUNGSI CEK LOGIN
window.cekLoginAdmin = () => {
  const pinInput = document.getElementById("adminPinInput").value.trim();
  if (pinInput === PIN_RAHASIA_ADMIN) {
    sessionStorage.setItem("admin_authenticated", "true");
    bukaPanelAdmin();
  } else {
    document.getElementById("loginError").innerText = "❌ PIN Admin Salah! Akses ditolak.";
  }
};

function bukaPanelAdmin() {
  document.getElementById("loginAdminBox").style.display = "none";
  document.getElementById("adminContent").style.display = "block";
  // Jalankan streaming database realtime setelah sukses login
  loadDevices();
  loadUsers();
  loadApkAdmin();
}

window.logoutAdmin = () => {
  sessionStorage.removeItem("admin_authenticated");
  window.location.reload();
};

// Cek status login saat halaman dibuka pertama kali
if (sessionStorage.getItem("admin_authenticated") === "true") {
  bukaPanelAdmin();
}

/* ==================== 3 FUNGSI UTAMA DEVICE CONTROL ==================== */

// 1. SETUJUI DEVICE
window.approveDevice = async () => {
  let id = deviceInput.value;
  let pin = pinInput.value.trim();
  if(!id || !pin) return alert("Pilih HP dari daftar di bawah dan isi PIN terlebih dahulu!");
  await setDoc(doc(db, "devices", id), { status: "approved", pin: pin }, { merge: true });
  alert("✅ Status Perangkat Berhasil Diubah: APPROVED!");
  clearDeviceSelection();
};

// 2. BAN/BLOKIR DEVICE
window.banDevice = async () => {
  let id = deviceInput.value;
  if(!id) return alert("Pilih HP dari daftar di bawah yang akan diblokir!");
  await setDoc(doc(db, "devices", id), { status: "banned" }, { merge: true });
  alert("⛔ Perangkat Berhasil DIBLOKIR!");
  clearDeviceSelection();
};

// 3. HAPUS DEVICE SECARA PERMANEN (Fitur Baru)
window.hapusDevicePermanent = async () => {
  let id = deviceInput.value;
  if(!id) return alert("Pilih HP dari daftar di bawah yang ingin dihapus datanya!");
  
  if(confirm("Apakah Anda yakin ingin MENGHAPUS perangkat ini secara permanen dari database?")) {
    try {
      await deleteDoc(doc(db, "devices", id));
      alert("🗑️ Perangkat berhasil dihapus total dari sistem!");
      clearDeviceSelection();
    } catch (e) {
      alert("Gagal menghapus device: " + e.message);
    }
  }
};

function clearDeviceSelection() {
  deviceInput.value = "";
  pinInput.value = "";
}

/* ======================================================================= */

/* MANAJEMEN DATA APK */
window.simpanLinkAPK = async () => {
  let v = versiInput.value;
  let nama = namaApkInput.value.trim();
  let link = linkApkInput.value.trim();

  if(!v || !nama || !link) return alert("Semua kolom wajib diisi!");

  let directLink = link;
  if(link.includes("drive.google.com/file/d/")) {
    let fileId = link.split("/file/d/")[1].split("/")[0];
    directLink = `https://docs.google.com/uc?export=download&id=${fileId}`;
  }

  try {
    document.getElementById("apkStatus").innerText = "Menyimpan data...";
    await addDoc(collection(db, "apk"), {
      versi: Number(v),
      url: directLink,
      nama: nama,
      createdAt: Date.now()
    });
    document.getElementById("apkStatus").innerText = "✅ Tautan Baru Berhasil Ditambahkan!";
    versiInput.value = ""; namaApkInput.value = ""; linkApkInput.value = "";
  } catch(e) {
    alert("Gagal: " + e.message);
  }
};

function loadApkAdmin(){
  const box = document.getElementById("adminApkList");
  onSnapshot(collection(db, "apk"), (snap) => {
    box.innerHTML = "";
    let arr = [];
    snap.forEach(d => { arr.push({ id: d.id, ...d.data() }); });
    arr.sort((a,b) => b.versi - a.versi);
    
    if(arr.length === 0){
      box.innerHTML = "<p style='color:var(--text-muted);font-size:14px;margin:0;'>Belum ada paket APK di database.</p>";
      return;
    }
    arr.forEach(a => {
      box.innerHTML += `
      <div class="flex-group">
        <span>📦 <b>v${a.versi}</b> - ${a.nama}</span>
        <button class="btn-red btn-small" onclick="hapusAPK('${a.id}')">🗑️ Hapus</button>
      </div>`;
    });
  });
}

window.hapusAPK = async (docId) => {
  if(confirm("Hapus APK ini dari daftar aplikasi publik?")) {
    await deleteDoc(doc(db, "apk", docId));
  }
};

function loadDevices(){
  const box = document.getElementById("deviceList");
  onSnapshot(collection(db, "devices"), (snap) => {
    box.innerHTML = "";
    snap.forEach(d => {
      let data = d.data();
      let statusColor = data.status === 'approved' ? varName('--green') : (data.status === 'banned' ? varName('--red') : varName('--orange'));
      
      box.innerHTML += `
      <div class="card" style="border-left: 5px solid ${statusColor}; margin-bottom:10px;">
        👤 Penyewa: <b>${data.nama_penyewa || 'Anonim'}</b><br>
        📱 Device ID: <small style="color:var(--text-muted);">${d.id}</small><br>
        ⚪ Status Sesi: <b style="color:${statusColor}">${data.status.toUpperCase()}</b><br>
        🔑 PIN Akses: <b>${data.pin || '-'}</b><br>
        <button class="btn-blue btn-small" onclick="isi('${d.id}', '${data.pin || ''}')" style="margin-top:10px;">Pilih HP Ini</button>
      </div>`;
    });
  });
}

function varName(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function loadUsers(){
  const box = document.getElementById("userList");
  onSnapshot(collection(db, "kontak"), (snap) => {
    box.innerHTML = "";
    snap.forEach(d => {
      let u = d.data();
      box.innerHTML += `<div class="flex-group"><span>👤 <b>${u.nama}</b> (HP: ${u.hp})</span></div>`;
    });
  });
}

window.isi = (id, currentPin) => { 
  deviceInput.value = id; 
  pinInput.value = currentPin;
};
</script>
</body>
</html>
