<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel Secure</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

/* LOGIN PAGE */
#loginBox{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:300px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* ADMIN DASHBOARD */
#adminPanel{
display:none;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h2>🔐 Admin Login</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">LOGIN</button>

<p id="error" style="color:red"></p>
</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

<h2>⚙️ Device Admin Panel</h2>

<div class="card">
<h3>Device Access Control</h3>
<p>Kelola device login pengguna.</p>
</div>

<div class="card">
<h3>Security Status</h3>
<p id="status">System Secure ✅</p>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>

/* ==============================
   ADMIN ACCOUNT (UBAH SENDIRI)
================================*/

const ADMIN_USER = "admin";
const ADMIN_PASS = "Amosrcp86";

/* ==============================
   CHECK LOGIN SESSION
================================*/

if(localStorage.getItem("adminLogin")=="true"){
showAdmin();
}

/* ==============================
   LOGIN FUNCTION
================================*/

function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u===ADMIN_USER && p===ADMIN_PASS){

localStorage.setItem("adminLogin","true");
showAdmin();

}else{
document.getElementById("error").innerText="Login Salah!";
}

}

/* ==============================
   SHOW PANEL
================================*/

function showAdmin(){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
}

/* ==============================
   LOGOUT
================================*/

function logout(){
localStorage.removeItem("adminLogin");
location.reload();
}

</script>

</body>
</html>
