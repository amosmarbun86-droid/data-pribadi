<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pusat Data Pribadi</title>

<style>
body{
font-family:Arial;
background:#f0f0f0;
padding:20px;
margin:0;
}

h1,h2{text-align:center;}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.15);
}

input,button{
padding:12px;
margin:5px 0;
width:100%;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{background:#1d4ed8;}

.media img,.media video{
width:100%;
border-radius:10px;
margin-top:10px;
}

.download{
display:block;
text-align:center;
background:#16a34a;
color:white;
padding:10px;
margin-top:8px;
border-radius:8px;
text-decoration:none;
}

/* LOGIN */
#loginBox{
max-width:350px;
margin:80px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

#error{color:red;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔒 Akses Data Pribadi</h2>
<input type="password" id="pass" placeholder="Masukkan Password">
<button onclick="cekPassword()">Masuk</button>
<p id="error"></p>
</div>

<!-- WEBSITE -->
<div id="content" style="display:none;">

<h1>📂 Pusat Data Pribadi</h1>

<h2>📒 Simpan Kontak</h2>

<div class="card">
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="Nomor HP">
<input id="email" placeholder="Email">
<button onclick="simpanKontakOnline()">Simpan</button>
</div>

<div id="hasil"></div>

<hr>

<h2>📁 File Penting</h2>

<div class="card">
<iframe
src="https://drive.google.com/file/d/1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa/preview"
width="100%" height="300"></iframe>

<br><br>

<a href="https://drive.google.com/uc?export=download&id=1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa">
<button>Download File</button>
</a>
</div>

<hr>

<h2>📸 Upload Foto & Video</h2>

<div class="card">

<input type="file" id="fileInput"
accept="image/*,video/*"
capture="environment">

<div id="preview"></div>

<button onclick="uploadFile()">Upload</button>

<h3>Gallery</h3>
<div id="gallery"></div>

</div>

</div>

<!-- PASSWORD -->
<script>
function cekPassword(){
const password=document.getElementById("pass").value;

if(password==="Amosrcp86#"){
loginBox.style.display="none";
content.style.display="block";
}else{
error.innerText="Password salah!";
}
}
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
authDomain:"data-pribadi-9cfe6.firebaseapp.com",
projectId:"data-pribadi-9cfe6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.simpanKontakOnline=async function(){

await addDoc(collection(db,"kontak"),{
nama:nama.value,
hp:hp.value,
email:email.value
});

alert("✅ Kontak tersimpan!");

nama.value="";
hp.value="";
email.value="";

tampil();
}

async function tampil(){

hasil.innerHTML="Memuat...";

const querySnapshot=await getDocs(collection(db,"kontak"));

hasil.innerHTML="";

querySnapshot.forEach(doc=>{
let k=doc.data();

hasil.innerHTML+=`
<div class="card">
<b>${k.nama}</b><br>
${k.hp}<br>
${k.email}
</div>`;
});
}

tampil();
</script>

<!-- CLOUDINARY UPLOAD -->
<script>

const CLOUD_NAME="dkisbfx29";
const UPLOAD_PRESET="ml_default";

let selectedFile;

fileInput.addEventListener("change",(e)=>{

selectedFile=e.target.files[0];
preview.innerHTML="";

if(selectedFile.type.startsWith("image")){
preview.innerHTML=`<img src="${URL.createObjectURL(selectedFile)}">`;
}else{
preview.innerHTML=`<video controls src="${URL.createObjectURL(selectedFile)}"></video>`;
}

});

async function uploadFile(){

if(!selectedFile){
alert("Pilih file dulu!");
return;
}

const formData=new FormData();
formData.append("file",selectedFile);
formData.append("upload_preset",UPLOAD_PRESET);

const res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,
{
method:"POST",
body:formData
});

const data=await res.json();

alert("✅ Upload berhasil!");

tambahGallery(data.secure_url,selectedFile.type);

preview.innerHTML="";
fileInput.value="";
}

function tambahGallery(url,type){

const box=document.createElement("div");
box.className="card media";

let media;

if(type.startsWith("video")){
media=document.createElement("video");
media.src=url;
media.controls=true;
}else{
media=document.createElement("img");
media.src=url;
}

const download=document.createElement("a");
download.href=url;
download.download="";
download.className="download";
download.innerText="⬇ Download";

box.appendChild(media);
box.appendChild(download);

gallery.prepend(box);
}

</script>

</body>
</html>
