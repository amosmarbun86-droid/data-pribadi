<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pusat Data Pribadi</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body{font-family:Arial;background:#f0f0f0;padding:20px;margin:0;}
h1,h2{text-align:center;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 0 8px rgba(0,0,0,0.15);box-sizing: border-box;}
input,button{padding:12px;margin:5px 0;width:100%;border-radius:8px;border:1px solid #ccc;box-sizing: border-box;}
button{background:#2563eb;color:white;border:none;}
.download{display:block;text-align:center;background:#16a34a;color:white;padding:10px;margin-top:8px;border-radius:8px;text-decoration:none;}
#error{color:red;text-align:center;}
</style>
</head>
<body>

<div id="loginBox">
<h2>🔒 Login Device</h2>
<p id="info" style="text-align:center;color:blue; font-weight:bold;"></p>

<div id="registerForm" style="display:none;">
<input type="text" id="namaPenyewaInput" placeholder="Masukkan Nama Penyewa HP">
<button onclick="kirimNamaPenyewa()" style="background:#16a34a;">📩 Minta PIN ke Admin</button>
</div>

<div id="pinForm" style="display:none;">
<input type="password" id="pin" placeholder="Masukkan PIN">
<button onclick="loginPIN()">Masuk</button>
</div>
<p id="error"></p>
</div>

<div id="content" style="display:none;">
<h1>📂 Pusat Data Pribadi</h1>

<h2>📒 Simpan Kontak</h2>
<div class="card">
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="HP">
<input id="email" placeholder="Email">
<button onclick="simpanKontakOnline()">Simpan</button>
</div>
<div id="hasil"></div>
<hr>

<h2>📁 File Penting</h2>
<div class="card">
<iframe src="https://drive.google.com/file/d/1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa/preview" width="100%" height="300"></iframe>
</div>
<hr>

<h2>📸 Upload File</h2>
<div class="card">
<input type="file" id="fileInput">
<div id="preview"></div>
<button onclick="uploadFile()">Upload</button>
<div id="gallery"></div>
</div>
<hr>

<h2>📤 Transfer File</h2>
<div class="card">
<input type="file" id="transferInput">
<button onclick="transferFile()">Upload</button>
<div id="transferResult"></div>
<canvas id="qrcode"></canvas>
</div>
<hr>

<h2>📦 Upload APK</h2>
<div class="card">
<input type="file" id="apkFile">
<input type="number" id="versi" placeholder="Versi">
<button onclick="uploadAPK()">Upload APK</button>
<p id="apkStatus"></p>
<h3>📥 Daftar APK</h3>
<div id="apkList"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
authDomain:"data-pribadi-9cfe6.firebaseapp.com",
projectId:"data-pribadi-9cfe6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let device_id="";

async function init(){
let id = localStorage.getItem("device_id");
if(!id){
  id = crypto.randomUUID();
  localStorage.setItem("device_id", id);
}
device_id = id;

const ref = doc(db,"devices",id);

onSnapshot(ref, async (snap) => {
  if(!snap.exists()){
    await setDoc(ref,{
      status:"pending",
      nama_penyewa:"Belum Mengisi Nama",
      createdAt:Date.now(),
      ua:navigator.userAgent
    });
    return;
  }

  const data = snap.data();

  /* 🚫 CEK BAN */
  if(data.status === "banned"){
    localStorage.setItem("login","false");
    document.body.innerHTML="<h1 style='text-align:center; color:red; margin-top:50px;'>⛔ Device Anda DIBLOKIR oleh Admin</h1>";
    return;
  }

  /* CEK STATUS PENDING */
  if(data.status === "pending"){
    loginBox.style.display="block";
    content.style.display="none";
    pinForm.style.display="none";
    registerForm.style.display="block";
    
    if(data.nama_penyewa && data.nama_penyewa !== "Belum Mengisi Nama") {
      info.innerHTML = `⏳ Menunggu PIN dari Admin...<br><small style='color:gray;'>Nama Penyewa: ${data.nama_penyewa}</small>`;
      registerForm.style.display = "none";
    } else {
      info.innerHTML = `⚠️ HP Rental Terdeteksi!<br><small style='color:gray;'>ID Perangkat: ${device_id}</small>`;
    }
    return;
  }

  /* AUTO LOGIN */
  if(data.status === "approved" && localStorage.getItem("login") === "true"){
    loginBox.style.display="none";
    content.style.display="block";
    tampil();
  } else {
    loginBox.style.display="block";
    content.style.display="none";
    registerForm.style.display="none";
    pinForm.style.display="block";
    info.innerHTML = `🔓 HP Disetujui untuk: <b>${data.nama_penyewa || 'User'}</b>.<br>Silakan masukkan PIN Anda:`;
  }
});
}

/* USER MENGIRIM KODE NAMA PENYEWA */
window.kirimNamaPenyewa = async () => {
const namaInput = namaPenyewaInput.value.trim();
if(!namaInput) return alert("Ketik nama penyewa terlebih dahulu!");

await setDoc(doc(db, "devices", device_id), {
  nama_penyewa: namaInput
}, { merge: true });

alert("✅ Nama berhasil dikirim ke database admin!");
};

/* LOGIN PIN */
window.loginPIN = async function(){
const snap = await getDoc(doc(db,"devices",device_id));
if(!snap.exists()) return;
const data = snap.data();

if(data.pin && data.pin === pin.value.trim()){
  localStorage.setItem("login","true");
  loginBox.style.display="none";
  content.style.display="block";
  tampil();
}else{
  error.innerText="PIN salah!";
}
};

/* KONTAK */
window.simpanKontakOnline = async()=>{
if(!nama.value || !hp.value) return alert("Nama dan HP wajib diisi");
await addDoc(collection(db,"kontak"),{
nama:nama.value,
hp:hp.value,
email:email.value,
device_id:device_id
});
nama.value=""; hp.value=""; email.value="";
tampil();
};

async function tampil(){
hasil.innerHTML="";
const snap = await getDocs(collection(db,"kontak"));
snap.forEach(d=>{
let k=d.data();
if(k.device_id===device_id){
hasil.innerHTML+=`<div class="card"><b>👤 ${k.nama}</b><br>📞 ${k.hp}<br>📧 ${k.email || '-'}</div>`;
}
});
}

/* APK MANAGEMENT */
window.uploadAPK = async()=>{
const file = apkFile.files[0];
const v = versi.value;
if(!file)return alert("Pilih file!");
if(!file.name.endsWith(".apk"))return alert("Harus APK!");

const newName=file.name.replace(".apk",".zip");
const fd=new FormData();
fd.append("file",new File([file],newName));
fd.append("upload_preset","ml_default");

apkStatus.innerText="Uploading...";
try {
  const res=await fetch("https://api.cloudinary.com/v1_1/dkisbfx29/raw/upload",{method:"POST",body:fd});
  const data=await res.json();

  await addDoc(collection(db,"apk"),{
  versi:Number(v),
  url:data.secure_url,
  nama:newName
  });
  apkStatus.innerText="Berhasil";
  loadAPK();
} catch(e) {
  apkStatus.innerText="Gagal upload";
}
};

async function loadAPK(){
apkList.innerHTML="";
const snap=await getDocs(collection(db,"apk"));
let arr=[];
snap.forEach(d=>arr.push(d.data()));
arr.sort((a,b)=>b.versi-a.versi);
arr.forEach(a=>{
apkList.innerHTML+=`
<div class="card">
Versi ${a.versi}
<button onclick="downloadAPK('${a.url}','${a.nama}')">Download</button>
</div>`;
});
}
loadAPK();

window.downloadAPK=(url,nama)=>{
fetch(url)
.then(r=>r.blob())
.then(b=>{
const a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download=nama.replace(".zip",".apk");
a.click();
});
};

init();
</script>

<script>
const CLOUD_NAME="dkisbfx29";
const UPLOAD_PRESET="ml_default";

fileInput.onchange=e=>{\nconst f=e.target.files[0];\npreview.innerHTML=`📄 ${f.name}`;\n};\n\nfunction uploadFile(){\nconst f=fileInput.files[0];\nif(!f) return alert("Pilih file!");\nconst fd=new FormData();\nfd.append("file",f);\nfd.append("upload_preset",UPLOAD_PRESET);\n\nconst xhr=new XMLHttpRequest();\nxhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);\nxhr.onload=()=>{\nconst d=JSON.parse(xhr.responseText);\ngallery.innerHTML+=`<a href="${d.secure_url}" class="download" target="_blank">Download File</a>`;\n};\nxhr.send(fd);\n}\n\nfunction transferFile(){\nconst f=transferInput.files[0];\nif(!f) return alert("Pilih file!");\nconst fd=new FormData();\nfd.append("file",f);\nfd.append("upload_preset",UPLOAD_PRESET);\n\nconst xhr=new XMLHttpRequest();\nxhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);\nxhr.onload=()=>{\nconst d=JSON.parse(xhr.responseText);\ntransferResult.innerHTML=d.secure_url;\nQRCode.toCanvas(qrcode,d.secure_url);\n};\nxhr.send(fd);\n}\n</script>\n</body>\n</html>
