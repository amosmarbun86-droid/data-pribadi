<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pusat Data Pribadi</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f0f0f0;
  padding:20px;
  margin:0;
}
h1,h2{text-align:center;}
.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 8px rgba(0,0,0,0.15);
}
input,button{
  padding:12px;
  margin:5px 0;
  width:100%;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  background:#2563eb;
  color:white;
  border:none;
}
.download{
  display:block;
  text-align:center;
  background:#16a34a;
  color:white;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  text-decoration:none;
}
progress{width:100%;}
#error{color:red;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔒 Akses Data Pribadi</h2>
  <input type="password" id="pass">
  <button onclick="cekPassword()">Masuk</button>
  <p id="error"></p>
</div>

<!-- CONTENT -->
<div id="content" style="display:none;">

<h1>📂 Pusat Data Pribadi</h1>

<!-- KONTAK -->
<h2>📒 Simpan Kontak</h2>
<div class="card">
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="HP">
<input id="email" placeholder="Email">
<button onclick="simpanKontakOnline()">Simpan</button>
</div>

<div id="hasil"></div>

<hr>

<!-- FILE -->
<h2>📁 File Penting</h2>
<div class="card">
<iframe src="https://drive.google.com/file/d/1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa/preview"
width="100%" height="300"></iframe>
</div>

<hr>

<!-- UPLOAD FILE -->
<h2>📸 Upload File</h2>
<div class="card">
<input type="file" id="fileInput">
<div id="preview"></div>
<progress id="progress" value="0" max="100"></progress>
<button onclick="uploadFile()">Upload</button>

<h3>Gallery</h3>
<div id="gallery"></div>
</div>

<hr>

<!-- TRANSFER -->
<h2>📤 Transfer File</h2>
<div class="card">
<input type="file" id="transferInput">
<button onclick="transferFile()">Upload</button>
<progress id="transferProgress"></progress>
<div id="transferResult"></div>
<canvas id="qrcode"></canvas>
</div>

<hr>

<!-- APK -->
<h2>📦 Upload APK</h2>
<div class="card">
<input type="file" id="apkFile">
<input type="number" id="versi" placeholder="Versi">
<button onclick="uploadAPK()">Upload APK</button>
<p id="apkStatus"></p>

<h3>📥 Daftar APK</h3>
<div id="apkList"></div>
</div>

</div>

<!-- LOGIN -->
<script>
function cekPassword(){
  if(pass.value==="Amosrcp86#"){
    localStorage.setItem("login","true");
    loginBox.style.display="none";
    content.style.display="block";
  }else{
    error.innerText="Password salah!";
  }
}

if(localStorage.getItem("login")==="true"){
  loginBox.style.display="none";
  content.style.display="block";
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIza...",
  authDomain:"data-pribadi-9cfe6.firebaseapp.com",
  projectId:"data-pribadi-9cfe6"
});

const db = getFirestore(app);

/* =========================
   DEVICE ID + AUTO APPROVE
========================= */
async function checkDevice(){
  let id = localStorage.getItem("device_id");

  if(!id){
    id = crypto.randomUUID();
    localStorage.setItem("device_id", id);
  }

  const ref = doc(db,"devices",id);
  const snap = await getDoc(ref);

  // auto daftar + approve
  if(!snap.exists()){
    await setDoc(ref,{
      status:"approved",
      createdAt:Date.now()
    });
    return;
  }

  const data = snap.data();

  // blok jika banned
  if(data.status === "banned"){
    document.body.innerHTML = "⛔ Device kamu diblokir admin";
  }

  // tambahan keamanan
  if(data.status !== "approved"){
    document.body.innerHTML = "⛔ Device tidak diizinkan";
  }
}
checkDevice();

/* =========================
   KONTAK (PAKAI DEVICE ID)
========================= */
window.simpanKontakOnline = async()=>{
  const device_id = localStorage.getItem("device_id");

  await addDoc(collection(db,"kontak"),{
    nama:nama.value,
    hp:hp.value,
    email:email.value,
    device_id: device_id,
    createdAt: Date.now()
  });

  tampil();
};

async function tampil(){
  hasil.innerHTML="";
  const device_id = localStorage.getItem("device_id");

  const snap = await getDocs(collection(db,"kontak"));

  snap.forEach(d=>{
    let k = d.data();

    // tampilkan hanya milik sendiri
    if(k.device_id === device_id){
      hasil.innerHTML += `
      <div class="card">
        ${k.nama}<br>${k.hp}
      </div>`;
    }
  });
}
tampil();

/* =========================
   APK
========================= */
window.uploadAPK = async()=>{
  const file = apkFile.files[0];
  const v = versi.value;

  if(!file) return alert("Pilih file!");
  if(!file.name.endsWith(".apk")) return alert("Harus APK!");

  const newName = file.name.replace(".apk",".zip");

  const fd = new FormData();
  fd.append("file", new File([file], newName));
  fd.append("upload_preset","ml_default");

  apkStatus.innerText="Uploading...";

  const res = await fetch("https://api.cloudinary.com/v1_1/dkisbfx29/raw/upload",{method:"POST",body:fd});
  const data = await res.json();

  await addDoc(collection(db,"apk"),{
    versi:Number(v),
    url:data.secure_url,
    nama:newName
  });

  apkStatus.innerText="Berhasil";
  loadAPK();
};

async function loadAPK(){
  apkList.innerHTML="";
  const snap = await getDocs(collection(db,"apk"));

  let arr=[];
  snap.forEach(d=>arr.push(d.data()));
  arr.sort((a,b)=>b.versi-a.versi);

  arr.forEach(a=>{
    apkList.innerHTML+=`
    <div class="card">
      Versi ${a.versi}
      <button onclick="downloadAPK('${a.url}','${a.nama}')">Download</button>
    </div>`;
  });
}
loadAPK();

window.downloadAPK = (url,nama)=>{
  fetch(url)
  .then(r=>r.blob())
  .then(b=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(b);
    a.download=nama.replace(".zip",".apk");
    a.click();
  });
};
</script>

<!-- CLOUDINARY -->
<script>
const CLOUD_NAME="dkisbfx29";
const UPLOAD_PRESET="ml_default";

fileInput.onchange=e=>{
  const f=e.target.files[0];
  preview.innerHTML=`📄 ${f.name}`;
};

function uploadFile(){
  const f=fileInput.files[0];
  const fd=new FormData();
  fd.append("file",f);
  fd.append("upload_preset",UPLOAD_PRESET);

  const xhr=new XMLHttpRequest();
  xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);

  xhr.onload=()=>{
    const d=JSON.parse(xhr.responseText);
    gallery.innerHTML+=`<a href="${d.secure_url}" class="download">Download</a>`;
  };

  xhr.send(fd);
}

function transferFile(){
  const f=transferInput.files[0];
  const fd=new FormData();
  fd.append("file",f);
  fd.append("upload_preset",UPLOAD_PRESET);

  const xhr=new XMLHttpRequest();
  xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);

  xhr.onload=()=>{
    const d=JSON.parse(xhr.responseText);
    transferResult.innerHTML=d.secure_url;
    QRCode.toCanvas(qrcode,d.secure_url);
  };

  xhr.send(fd);
}
</script>

</body>
</html>
