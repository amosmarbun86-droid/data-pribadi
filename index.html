<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pusat Data Pribadi</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
background:#f0f0f0;
padding:20px;
margin:0;
}

h1,h2{text-align:center;}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.15);
}

input,button{
padding:12px;
margin:5px 0;
width:100%;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{background:#1d4ed8;}

.media img,.media video{
width:100%;
border-radius:10px;
margin-top:10px;
}

.download{
display:block;
text-align:center;
background:#16a34a;
color:white;
padding:10px;
margin-top:8px;
border-radius:8px;
text-decoration:none;
}

progress{width:100%;height:10px;}

#loginBox{
max-width:350px;
margin:80px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

#error{color:red;}
canvas{margin-top:10px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔒 Akses Data Pribadi</h2>
<input type="password" id="pass" placeholder="Masukkan Password">
<button onclick="cekPassword()">Masuk</button>
<p id="error"></p>
</div>

<!-- CONTENT -->
<div id="content" style="display:none;">

<h1>📂 Pusat Data Pribadi</h1>

<!-- ================= KONTAK ================= -->
<h2>📒 Simpan Kontak</h2>

<div class="card">
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="Nomor HP">
<input id="email" placeholder="Email">
<button onclick="simpanKontakOnline()">Simpan</button>
</div>

<div id="hasil"></div>

<hr>

<!-- ================= FILE DRIVE ================= -->
<h2>📁 File Penting</h2>

<div class="card">
<iframe
src="https://drive.google.com/file/d/1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa/preview"
width="100%" height="300"></iframe>

<br><br>

<a href="https://drive.google.com/uc?export=download&id=1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa">
<button>Download File</button>
</a>
</div>

<hr>

<!-- ================= UPLOAD MEDIA ================= -->
<h2>📸 Upload Foto & Video</h2>

<div class="card">

<input type="file" id="fileInput" accept="image/*,video/*" capture="environment">

<div id="preview"></div>

<progress id="progress" value="0" max="100"></progress>

<button onclick="uploadFile()">Upload</button>

<h3>Gallery</h3>
<div id="gallery"></div>

</div>

<hr>

<!-- ================= FILE TRANSFER PRO ================= -->
<h2>📤 File Transfer PRO</h2>

<div class="card">

<input type="file" id="transferInput">

<button onclick="transferFile()">Upload & Generate Link</button>

<progress id="transferProgress" value="0" max="100"></progress>

<div id="transferResult"></div>

<canvas id="qrcode"></canvas>

</div>

</div>

<!-- LOGIN SCRIPT -->

if(password==="Amosrcp86#"){
localStorage.setItem("login","true");

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
authDomain:"data-pribadi-9cfe6.firebaseapp.com",
projectId:"data-pribadi-9cfe6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

window.simpanKontakOnline=async function(){
await addDoc(collection(db,"kontak"),{
nama:nama.value,
hp:hp.value,
email:email.value
});

alert("✅ Kontak tersimpan!");
nama.value="";
hp.value="";
email.value="";
tampil();
}

async function tampil(){
hasil.innerHTML="";
const querySnapshot=await getDocs(collection(db,"kontak"));

querySnapshot.forEach(doc=>{
let k=doc.data();
hasil.innerHTML+=`
<div class="card">
<b>${k.nama}</b><br>
${k.hp}<br>
${k.email}
</div>`;
});
}

tampil();
</script>

<!-- CLOUDINARY -->
<script>

const CLOUD_NAME="dkisbfx29";
const UPLOAD_PRESET="ml_default";

let selectedFile;

fileInput.addEventListener("change",(e)=>{
selectedFile=e.target.files[0];
preview.innerHTML="";

if(selectedFile.type.startsWith("image")){
preview.innerHTML=`<img src="${URL.createObjectURL(selectedFile)}">`;
}else{
preview.innerHTML=`<video controls src="${URL.createObjectURL(selectedFile)}"></video>`;
}
});

function uploadFile(){

if(!selectedFile)return alert("Pilih file!");

const url=`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

const formData=new FormData();
formData.append("file",selectedFile);
formData.append("upload_preset",UPLOAD_PRESET);

const xhr=new XMLHttpRequest();
xhr.open("POST",url,true);

xhr.upload.onprogress=e=>{
if(e.lengthComputable){
progress.value=(e.loaded/e.total)*100;
}
};

xhr.onload=()=>{
const data=JSON.parse(xhr.responseText);

tambahGallery(data.secure_url,selectedFile.type);

progress.value=0;
preview.innerHTML="";
fileInput.value="";
};

xhr.send(formData);
}

function tambahGallery(url,type){

const box=document.createElement("div");
box.className="card media";

let media;

if(type.startsWith("video")){
media=document.createElement("video");
media.src=url;
media.controls=true;
}else{
media=document.createElement("img");
media.src=url;
}

const download=document.createElement("a");
download.href=url;
download.download="";
download.className="download";
download.innerText="⬇ Download";

box.appendChild(media);
box.appendChild(download);

gallery.prepend(box);
}

/* ================= FILE TRANSFER PRO ================= */

function transferFile(){

const file=transferInput.files[0];
if(!file)return alert("Pilih file!");

const url=`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`;

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset",UPLOAD_PRESET);

const xhr=new XMLHttpRequest();
xhr.open("POST",url,true);

xhr.upload.onprogress=e=>{
if(e.lengthComputable){
transferProgress.value=(e.loaded/e.total)*100;
}
};

xhr.onload=()=>{
const res=JSON.parse(xhr.responseText);
const link=res.secure_url;

transferResult.innerHTML=`
✅ Link siap:<br>
<a href="${link}" target="_blank">${link}</a>
<button onclick="copyLink('${link}')">Copy Link</button>
`;

QRCode.toCanvas(document.getElementById("qrcode"),link);

transferProgress.value=0;
transferInput.value="";
};

xhr.send(formData);
}

function copyLink(link){
navigator.clipboard.writeText(link);
alert("Link disalin!");
}

</script>

</body>
</html>
