<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pusat Data Pribadi PRO</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}
h1,h2{text-align:center;}
.card{
background:#1e293b;
padding:15px;
margin:10px 0;
border-radius:12px;
}
input,button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
}
button{background:#22c55e;color:white;}
.red{background:#ef4444;}
.media img,.media video{
width:100%;
border-radius:10px;
margin-top:10px;
}
.download{
display:block;
background:#16a34a;
padding:8px;
text-align:center;
margin-top:5px;
border-radius:6px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔒 Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
<p id="error"></p>
</div>

<!-- CONTENT -->
<div id="app" style="display:none;">

<h1>🚀 Panel Data PRO</h1>

<div id="updateBox"></div>

<!-- KONTAK -->
<div class="card">
<h2>📒 Simpan Kontak</h2>
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="HP">
<input id="email" placeholder="Email">
<button onclick="saveContact()">Simpan</button>
<div id="kontakList"></div>
</div>

<!-- UPLOAD FILE -->
<div class="card">
<h2>📂 Upload Semua File</h2>
<input type="file" id="fileInput">
<progress id="progress" value="0" max="100"></progress>
<button onclick="uploadFile()">Upload</button>
<div id="gallery"></div>
</div>

<!-- APK -->
<div class="card">
<h2>📱 APK Update System</h2>
<input type="file" id="apkFile" accept=".apk">
<input id="versi" placeholder="Versi (1,2,3)">
<button onclick="uploadAPK()">Upload APK</button>
<p id="apkStatus"></p>

<h3>📥 Daftar APK</h3>
<div id="apkList"></div>
</div>

<!-- TRANSFER -->
<div class="card">
<h2>📤 Transfer File</h2>
<input type="file" id="transferFileInput">
<button onclick="transferFile()">Upload</button>
<progress id="transferProgress" value="0" max="100"></progress>
<div id="transferResult"></div>
<canvas id="qrcode"></canvas>
</div>

</div>

<script>
function login(){
if(pass.value==="Amosrcp86#"){
localStorage.setItem("login","1");
loginBox.style.display="none";
app.style.display="block";
}else error.innerText="Salah!";
}
if(localStorage.getItem("login")){
loginBox.style.display="none";
app.style.display="block";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const appFirebase=initializeApp({
apiKey:"AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
authDomain:"data-pribadi-9cfe6.firebaseapp.com",
projectId:"data-pribadi-9cfe6"
});
const db=getFirestore(appFirebase);

/* DEVICE CHECK */
async function checkDevice(){
let id=localStorage.getItem("device_id")||crypto.randomUUID();
localStorage.setItem("device_id",id);

const snap=await getDoc(doc(db,"devices",id));
if(!snap.exists()){
document.body.innerHTML=`<h2>Device belum diizinkan<br>${id}</h2>`;
return;
}
if(snap.data().status==="banned"){
document.body.innerHTML="<h2>Device diblokir</h2>";
}
}
checkDevice();

/* KONTAK */
window.saveContact=async()=>{
await addDoc(collection(db,"kontak"),{
nama:nama.value,
hp:hp.value,
email:email.value
});
loadContact();
};
async function loadContact(){
kontakList.innerHTML="";
const snap=await getDocs(collection(db,"kontak"));
snap.forEach(d=>{
let k=d.data();
kontakList.innerHTML+=`<div class="card">${k.nama}<br>${k.hp}</div>`;
});
}
loadContact();

/* APK SYSTEM */
window.uploadAPK=async()=>{
const file=apkFile.files[0];
const v=versi.value;

if(!file || !file.name.endsWith(".apk")) return alert("File APK!");
if(!v) return alert("Isi versi!");

const fd=new FormData();
fd.append("file",file);
fd.append("upload_preset","ml_default");

const res=await fetch("https://api.cloudinary.com/v1_1/dkisbfx29/raw/upload",{method:"POST",body:fd});
const data=await res.json();

if(data.error){ alert(data.error.message); return; }

await addDoc(collection(db,"apk"),{
versi:Number(v),
url:data.secure_url
});

apkStatus.innerText="✅ Upload sukses";
loadAPK();
};

async function loadAPK(){
apkList.innerHTML="";
const snap=await getDocs(collection(db,"apk"));

let max=0,link="";
snap.forEach(d=>{
let a=d.data();
if(a.versi>max){max=a.versi;link=a.url;}

apkList.innerHTML+=`
<div class="card">
Versi ${a.versi}<br>
<a class="download" href="${a.url}" target="_blank">Download</a>
</div>`;
});

/* AUTO UPDATE */
let local=localStorage.getItem("ver")||0;
if(max>local){
updateBox.innerHTML=`
<div class="card">
🔥 Update tersedia v${max}
<button onclick="updateApp('${link}',${max})">Update</button>
</div>`;
}
}
loadAPK();

window.updateApp=(url,v)=>{
window.open(url);
localStorage.setItem("ver",v);
};

/* FILE UPLOAD */
const CLOUD="dkisbfx29",PRESET="ml_default";
let selected;

fileInput.onchange=e=>selected=e.target.files[0];

window.uploadFile=()=>{
if(!selected)return alert("Pilih file!");

const xhr=new XMLHttpRequest();
xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD}/raw/upload`);

const fd=new FormData();
fd.append("file",selected);
fd.append("upload_preset",PRESET);

xhr.upload.onprogress=e=>progress.value=(e.loaded/e.total)*100;

xhr.onload=()=>{
const d=JSON.parse(xhr.responseText);
gallery.innerHTML+=`<a class="download" href="${d.secure_url}" target="_blank">File</a>`;
};

xhr.send(fd);
};

/* TRANSFER */
window.transferFile=()=>{
const file=transferFileInput.files[0];
if(!file)return alert("Pilih file!");

const xhr=new XMLHttpRequest();
xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUD}/raw/upload`);

const fd=new FormData();
fd.append("file",file);
fd.append("upload_preset",PRESET);

xhr.upload.onprogress=e=>transferProgress.value=(e.loaded/e.total)*100;

xhr.onload=()=>{
const d=JSON.parse(xhr.responseText);
transferResult.innerHTML=`<a href="${d.secure_url}" target="_blank">${d.secure_url}</a>`;
QRCode.toCanvas(qrcode,d.secure_url);
};

xhr.send(fd);
};
</script>

</body>
</html>
