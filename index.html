<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pusat Data Saya</title>

<style>

body{
font-family:Arial;
background:#f0f0f0;
padding:20px;
margin:0;
}

h1,h2{
text-align:center;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.15);
}

input,button{
padding:12px;
margin:5px 0;
width:100%;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* LOGIN BOX */
#loginBox{
max-width:350px;
margin:80px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

#error{
color:red;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>🔒 Akses Data Pribadi</h2>
<input type="password" id="pass" placeholder="Masukkan Password">
<button onclick="cekPassword()">Masuk</button>
<p id="error"></p>
</div>

<!-- CONTENT WEBSITE -->
<div id="content" style="display:none;">

<h1>📂 Pusat Data Pribadi</h1>

<h2>📒 Simpan Kontak</h2>

<div class="card">
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="Nomor HP">
<input id="email" placeholder="Email">
<button onclick="simpanKontakOnline()">Simpan</button>
</div>

<div id="hasil"></div>

<hr>

<h2>📁 File Penting</h2>

<div class="card">

<iframe
src="https://drive.google.com/file/d/1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa/preview"
width="100%" height="300">
</iframe>

<br><br>

<a href="https://drive.google.com/uc?export=download&id=1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa">
<button>Download File</button>
</a>

</div>

</div>

<!-- PASSWORD SCRIPT -->
<script>
function cekPassword(){

const password = document.getElementById("pass").value;

/* GANTI PASSWORD DI SINI */
if(password === "Amosrcp86#"){
document.getElementById("loginBox").style.display="none";
document.getElementById("content").style.display="block";
}else{
document.getElementById("error").innerText="Password salah!";
}

}
</script>


<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
authDomain: "data-pribadi-9cfe6.firebaseapp.com",
projectId: "data-pribadi-9cfe6",
storageBucket: "data-pribadi-9cfe6.firebasestorage.app",
messagingSenderId: "615916680811",
appId: "1:615916680811:web:e098080afdf8078b74632e",
measurementId: "G-K95HF8C430"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// SIMPAN DATA
window.simpanKontakOnline = async function(){

await addDoc(collection(db,"kontak"),{
nama:nama.value,
hp:hp.value,
email:email.value
});

alert("✅ Kontak tersimpan online!");

nama.value="";
hp.value="";
email.value="";

tampil();

}


// TAMPILKAN DATA
async function tampil(){

hasil.innerHTML="Memuat data...";

const querySnapshot = await getDocs(collection(db,"kontak"));

hasil.innerHTML="";

querySnapshot.forEach(doc => {

let k = doc.data();

hasil.innerHTML += `
<div class="card">
<b>${k.nama}</b><br>
${k.hp}<br>
${k.email}
</div>`;

});

}

tampil();

</script>

</body>
</html>
