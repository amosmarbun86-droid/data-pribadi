<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pusat Data Pribadi</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body{font-family:Arial;background:#f0f0f0;padding:20px;margin:0;}
h1,h2{text-align:center;}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 0 8px rgba(0,0,0,0.15);box-sizing: border-box;}
input,button{padding:12px;margin:5px 0;width:100%;border-radius:8px;border:1px solid #ccc;box-sizing: border-box;}
button{background:#2563eb;color:white;border:none;font-weight:bold;cursor:pointer;}
.download{display:block;text-align:center;background:#16a34a;color:white;padding:12px;margin-top:8px;border-radius:8px;text-decoration:none;font-weight:bold;font-size:16px;}
#error{color:red;text-align:center;}
</style>
</head>
<body>

<div id="loginBox">
<h2>🔒 Login Device</h2>
<p id="info" style="text-align:center;color:blue; font-weight:bold;"></p>

<div id="registerForm" style="display:none;">
<input type="text" id="namaPenyewaInput" placeholder="Masukkan Nama Penyewa HP">
<button onclick="kirimNamaPenyewa()" style="background:#16a34a;">📩 Minta PIN ke Admin</button>
</div>

<div id="pinForm" style="display:none;">
<input type="password" id="pin" placeholder="Masukkan PIN">
<button onclick="loginPIN()">Masuk</button>
</div>
<p id="error"></p>
</div>

<div id="content" style="display:none;">
<h1>📂 Pusat Data Pribadi</h1>

<h2>📒 Simpan Kontak</h2>
<div class="card">
<input id="nama" placeholder="Nama">
<input id="hp" placeholder="HP">
<input id="email" placeholder="Email">
<button onclick="simpanKontakOnline()">Simpan</button>
</div>
<div id="hasil"></div>
<hr>

<h2>📁 File Penting</h2>
<div class="card">
<iframe src="https://drive.google.com/file/d/1ASdXZ2ps-i7KaAMvjdtCEDDxrNYPQWRa/preview" width="100%" height="300"></iframe>
</div>
<hr>

<h2>📸 Upload File (Gambar/Media)</h2>
<div class="card">
<input type="file" id="fileInput">
<div id="preview"></div>
<button onclick="uploadFile()">Upload</button>
<div id="gallery"></div>
</div>
<hr>

<h2>📤 Transfer File / APK (Via Link MediaFire/Drive)</h2>
<div class="card">
<input type="text" id="transferLinkInput" placeholder="Tempel / Paste Link MediaFire / Drive Disini">
<button onclick="prosesMediaFireLink()">Buat Tautan & QR Code</button>
<div id="transferResult" style="margin-top:10px;"></div>
<div style="text-align:center; margin-top:10px;">
  <canvas id="qrcode"></canvas>
</div>
</div>
<hr>

<h2>📦 Daftar APK WA Sender</h2>
<div class="card">
<h3>📥 Daftar APK Tersedia</h3>
<div id="apkList"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
authDomain:"data-pribadi-9cfe6.firebaseapp.com",
projectId:"data-pribadi-9cfe6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let device_id="";

async function init(){
let id = localStorage.getItem("device_id");
if(!id){
  id = crypto.randomUUID();
  localStorage.setItem("device_id", id);
}
device_id = id;

const ref = doc(db,"devices",id);

onSnapshot(ref, async (snap) => {
  if(!snap.exists()){
    await setDoc(ref,{
      status:"pending",
      nama_penyewa:"Belum Mengisi Nama",
      createdAt:Date.now(),
      ua:navigator.userAgent
    });
    return;
  }

  const data = snap.data();

  if(data.status === "banned"){
    localStorage.setItem("login","false");
    document.body.innerHTML="<h1 style='text-align:center; color:red; margin-top:50px;'>⛔ Device Anda DIBLOKIR oleh Admin</h1>";
    return;
  }

  if(data.status === "pending"){
    loginBox.style.display="block";
    content.style.display="none";
    pinForm.style.display="none";
    registerForm.style.display="block";
    
    if(data.nama_penyewa && data.nama_penyewa !== "Belum Mengisi Nama") {
      info.innerHTML = `⏳ Menunggu PIN dari Admin...<br><small style='color:gray;'>Nama Penyewa: ${data.nama_penyewa}</small>`;
      registerForm.style.display = "none";
    } else {
      info.innerHTML = `⚠️ HP Rental Terdeteksi!<br><small style='color:gray;'>ID Perangkat: ${device_id}</small>`;
    }
    return;
  }

  if(data.status === "approved" && localStorage.getItem("login") === "true"){
    loginBox.style.display="none";
    content.style.display="block";
    tampil();
    listenAPK(); // Panggil realtime listen apk
  } else {
    loginBox.style.display="block";
    content.style.display="none";
    registerForm.style.display="none";
    pinForm.style.display="block";
    info.innerHTML = `🔓 HP Disetujui untuk: <b>${data.nama_penyewa || 'User'}</b>.<br>Silakan masukkan PIN Anda:`;
  }
});
}

window.kirimNamaPenyewa = async () => {
const namaInput = namaPenyewaInput.value.trim();
if(!namaInput) return alert("Ketik nama penyewa terlebih dahulu!");
await setDoc(doc(db, "devices", device_id), { nama_penyewa: namaInput }, { merge: true });
alert("✅ Nama berhasil dikirim ke database admin!");
};

window.loginPIN = async function(){
const snap = await getDoc(doc(doc(db,"devices",device_id)));
if(!snap.exists()) return;
const data = snap.data();

if(data.pin && data.pin === pin.value.trim()){
  localStorage.setItem("login","true");
  loginBox.style.display="none";
  content.style.display="block";
  tampil();
  listenAPK();
}else{
  error.innerText="PIN salah!";
}
};

window.simpanKontakOnline = async()=>{
if(!nama.value || !hp.value) return alert("Nama dan HP wajib diisi");
await addDoc(collection(db,"kontak"),{ nama:nama.value, hp:hp.value, email:email.value, device_id:device_id });
nama.value=""; hp.value=""; email.value="";
tampil();
};

async function tampil(){
hasil.innerHTML="";
const snap = await getDocs(collection(db,"kontak"));
snap.forEach(d=>{
let k=d.data();
if(k.device_id===device_id){
hasil.innerHTML+=`<div class="card"><b>👤 ${k.nama}</b><br>📞 ${k.hp}<br>📧 ${k.email || '-'}</div>`;
}
});
}

/* 🔄 MENAMPILKAN DAFTAR APK SECARA REALTIME (SINKRON DENGAN ADMIN) */
function listenAPK(){
const apkList = document.getElementById("apkList");
onSnapshot(collection(db, "apk"), (snap) => {
  apkList.innerHTML = "";
  let arr = [];
  snap.forEach(d => arr.push(d.data()));
  arr.sort((a,b) => b.versi - a.versi);
  
  if(arr.length === 0) {
    apkList.innerHTML = "<p style='color:gray;text-align:center;'>Belum ada APK yang dibagikan oleh admin.</p>";
    return;
  }

  arr.forEach(a => {
    apkList.innerHTML += `
    <div class="card" style="border-left: 5px solid #16a34a;">
      <p style="margin:0 0 8px 0;">📦 <b>${a.nama || 'Aplikasi WA Sender'}</b> (Versi ${a.versi})</p>
      <a href="${a.url}" class="download" target="_blank">Download & Instal APK</a>
    </div>`;
  });
});
}

init();

/* PROSES CONVERT LINK MEDIAFIRE ATAU DRIVE */
window.prosesMediaFireLink = () => {
  let link = document.getElementById("transferLinkInput").value.trim();
  if(!link) return alert("Silakan masukkan link MediaFire / Drive!");

  let directLink = link;
  if(link.includes("drive.google.com/file/d/")) {
    const fileId = link.split("/file/d/")[1].split("/")[0];
    directLink = `https://docs.google.com/uc?export=download&id=${fileId}`;
  }

  document.getElementById("transferResult").innerHTML = `
    <a href="${directLink}" class="download" target="_blank" style="background: #2563eb;">Download / Buka Halaman File</a>
  `;

  const canvas = document.getElementById('qrcode');
  QRCode.toCanvas(canvas, directLink, { width: 200 }, function (error) {
    if (error) console.error(error);
  });
};
</script>

<script>
const CLOUD_NAME = "dkisbfx29";
const UPLOAD_PRESET = "ml_default";

fileInput.onchange = e => {
  const f = e.target.files[0];
  if(f) preview.innerHTML = `📄 ${f.name}`;
};

function uploadFile(){
  const f = fileInput.files[0];
  if(!f) return alert("Pilih file!");
  const fd = new FormData();
  fd.append("file", f);
  fd.append("upload_preset", UPLOAD_PRESET);

  const xhr = new XMLHttpRequest();
  xhr.open("POST", `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
  xhr.onload = () => {
    const d = JSON.parse(xhr.responseText);
    if(d.secure_url) {
      gallery.innerHTML += `<a href="${d.secure_url}" class="download" target="_blank">Download File</a>`;
    }
  };
  xhr.send(fd);
}
</script>
</body>
</html>
