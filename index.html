<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pusat Data Pribadi</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f0f0f0;
  padding:20px;
  margin:0;
}

h1,h2{text-align:center;}

.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 8px rgba(0,0,0,0.15);
}

input,button{
  padding:12px;
  margin:5px 0;
  width:100%;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  background:#2563eb;
  color:white;
  border:none;
}

button:hover{background:#1d4ed8;}

.download{
  display:block;
  text-align:center;
  background:#16a34a;
  color:white;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  text-decoration:none;
}

progress{width:100%;}
#error{color:red;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h2>🔒 Akses Data Pribadi</h2>
  <input type="password" id="pass">
  <button onclick="cekPassword()">Masuk</button>
  <p id="error"></p>
</div>

<div id="content" style="display:none;">

<h1>📂 Pusat Data Pribadi</h1>

<!-- APK PANEL -->
<h2>📦 Upload APK (Auto Update)</h2>
<div class="card">
  <input type="file" id="apkFile">
  <input type="number" id="versi" placeholder="Versi (1,2,3...)">
  <button onclick="uploadAPK()">Upload APK</button>
  <p id="apkStatus"></p>

  <h3>📥 Daftar APK</h3>
  <div id="apkList"></div>
</div>

</div>

<script>
function cekPassword(){
  if(pass.value==="Amosrcp86#"){
    localStorage.setItem("login","true");
    loginBox.style.display="none";
    content.style.display="block";
  }else{
    error.innerText="Password salah!";
  }
}

if(localStorage.getItem("login")==="true"){
  loginBox.style.display="none";
  content.style.display="block";
}
</script>

<script type="module">
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyCn-bZackCi5wAPjbmDHK4Ur-qt0Ft3Xjs",
  authDomain:"data-pribadi-9cfe6.firebaseapp.com",
  projectId:"data-pribadi-9cfe6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


// 🔥 UPLOAD APK FINAL
window.uploadAPK = async () => {
  const file = apkFile.files[0];
  const v = versi.value;

  if (!file) return alert("❌ Pilih file!");
  if (!file.name.toLowerCase().endsWith(".apk")) return alert("❌ Harus APK!");
  if (!v || isNaN(v)) return alert("❌ Isi versi!");

  try {
    const cleanName = file.name
      .replace(".apk", "")
      .replace(/[^a-zA-Z0-9]/g, "_");

    const newName = cleanName + ".zip";

    const renamedFile = new File([file], newName, {
      type: "application/zip"
    });

    const fd = new FormData();
    fd.append("file", renamedFile);
    fd.append("upload_preset", "ml_default");

    apkStatus.innerText = "⏳ Uploading...";

    const res = await fetch(
      "https://api.cloudinary.com/v1_1/dkisbfx29/raw/upload",
      { method: "POST", body: fd }
    );

    const data = await res.json();

    if (data.error) {
      alert(data.error.message);
      apkStatus.innerText="";
      return;
    }

    await addDoc(collection(db, "apk"), {
      versi: Number(v),
      url: data.secure_url,
      nama: newName,
      created: Date.now()
    });

    apkStatus.innerText = "✅ Upload berhasil";

    apkFile.value="";
    versi.value="";

    loadAPK();

  } catch (err) {
    alert("❌ Upload gagal!");
    apkStatus.innerText="";
  }
};


// 🔥 LOAD APK LIST
async function loadAPK(){
  apkList.innerHTML="";
  const snap = await getDocs(collection(db,"apk"));

  let arr=[];
  snap.forEach(d=>arr.push(d.data()));

  // urut versi terbaru
  arr.sort((a,b)=>b.versi-a.versi);

  arr.forEach(a=>{
    apkList.innerHTML += `
    <div class="card">
      <b>Versi ${a.versi}</b><br>
      <button onclick="downloadAPK('${a.url}','${a.nama}')">
      ⬇ Download APK
      </button>
    </div>`;
  });
}

loadAPK();


// 🔥 DOWNLOAD AUTO RENAME KE APK
window.downloadAPK = function(url,nama){
  fetch(url)
  .then(res=>res.blob())
  .then(blob=>{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);

    a.download = nama.replace(".zip",".apk");

    a.click();
  });
};

</script>

</body>
</html>
